        .dict-table tbody tr:nth-child(even) td {
            background: var(--row-alt);
        }
        .dict-table tbody tr:hover td {
            background: var(--row-hover);
        }
        .col-num {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
        }
        .col-cat {

            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.35px;
        }
        .dict-table a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .dict-table a:hover {
            text-decoration: underline;
        }
        .tr-col a { color: var(--text); }
        .tr-col a:hover { color: var(--accent); }
        .en-col a { font-weight: 600; }

        .empty-state {
            padding: 24px 0;
